version: '3.8'

services:
  # Camera Stream Proxy Main Service
  camera-stream-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: camera-stream-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"   # API service
      - "8081:8081"   # WebSocket/WebRTC
      - "9090:9090"   # Metrics
    volumes:
      - ../config:/app/config:ro
      - camera_cache:/app/cache
      - camera_recordings:/app/recordings
      - camera_logs:/app/logs
      - /dev:/dev    # For USB camera access
    devices:
      - /dev/video0:/dev/video0  # USB camera (adjust as needed)
    privileged: true  # Required for hardware access
    environment:
      - CAMERA_STREAM_SERVER_HOST=0.0.0.0
      - CAMERA_STREAM_SERVER_PORT=8080
      - CAMERA_STREAM_LOGGING_LEVEL=info
    networks:
      - camera-network
    depends_on:
      - redis
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: camera-stream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - camera-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: camera-stream-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - camera-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: camera-stream-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - camera-network
    depends_on:
      - prometheus

  # NGINX reverse proxy
  nginx:
    image: nginx:alpine
    container_name: camera-stream-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - camera-network
    depends_on:
      - camera-stream-proxy

  # Jaeger for distributed tracing (optional)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: camera-stream-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - camera-network
    profiles:
      - monitoring

  # Development tools (only for development profile)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: camera-stream-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - camera-network
    profiles:
      - development

networks:
  camera-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  camera_cache:
    driver: local
  camera_recordings:
    driver: local
  camera_logs:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local 