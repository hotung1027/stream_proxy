# Camera Stream Proxy - Development Configuration

server:
  host: "127.0.0.1"
  port: 9080
  api_version: "v1"
  
streaming:
  buffer_size: "50MB"
  max_concurrent_streams: 5
  hardware_acceleration: false  # Disable for better compatibility during dev
  
sources:
  usb:
    auto_detect: true
    scan_interval: "10s"  # Faster scanning for development
    
cache:
  memory_size: "100MB"  # Smaller cache for development
  disk_path: "./cache"
  
outputs:
  web:
    enabled: true
    port: 8081
    
logging:
  level: "debug"  # Verbose logging for development
  format: "pretty"  # Human-readable format 